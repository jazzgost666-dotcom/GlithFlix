<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glith-Flix</title>
  <style>
    :root {
      --bg-main: #0f0f0f;
      --bg-card: #181818;
      --bg-card-hover: #222222;
      --text-main: #ffffff;
      --text-sub: #aaaaaa;
      --accent: #e50914;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font);
      padding: 20px 16px;
      line-height: 1.4;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 16px;
      border-bottom: 1px solid #222;
      padding-bottom: 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* --- PERFIS --- */
    .profiles-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .profile-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      width: 56px;
    }

    .profile-avatar-box {
      position: relative;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid transparent;
      transition: transform 0.2s ease, border-color 0.2s ease;
      background-color: #333;
    }

    .profile-item:hover .profile-avatar-box {
      transform: scale(1.05);
    }

    .profile-item.active .profile-avatar-box {
      border-color: var(--accent);
    }

    .profile-avatar-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Lápis de Edição no Hover */
    .edit-pencil {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      font-size: 1.1rem;
      color: #fff;
    }

    .profile-avatar-box:hover .edit-pencil {
      opacity: 1;
    }

    .profile-name-label {
      font-size: 0.72rem;
      margin-top: 4px;
      color: var(--text-sub);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .profile-item.active .profile-name-label {
      color: var(--text-main);
      font-weight: bold;
    }

    .btn-add-profile {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px dashed #444;
      background: transparent;
      color: var(--text-sub);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-add-profile:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #file-upload-input {
      display: none;
    }

    /* --- SEÇÕES & CARDS --- */
    section {
      margin-bottom: 40px;
    }

    section h2 {
      font-size: 1.3rem;
      margin-bottom: 16px;
      color: #fff;
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: var(--bg-card);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #222;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      background-color: var(--bg-card-hover);
    }

    .thumb-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #000;
    }

    .thumb-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Barra Vermelha de Progresso */
    .progress-track {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.25);
    }

    .progress-fill {
      height: 100%;
      background-color: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    .card-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--text-sub);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .audio-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: auto;
      padding-top: 6px;
    }

    .btn-audio {
      background-color: #2a2a2a;
      color: #fff;
      border: 1px solid #3a3a3a;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      text-align: left;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .btn-audio:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    /* --- MODAL DO PLAYER --- */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.92);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }

    .modal-container {
      position: relative;
      width: 92%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .btn-close-modal {
      position: absolute;
      top: -38px;
      right: 0;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }

    #player-iframe-target {
      width: 100%;
      height: 100%;
    }

    /* Ajustes para Telas Menores / Mobile */
    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }

      .card-body {
        padding: 10px;
      }

      .card-title {
        font-size: 0.85rem;
      }

      .card-desc {
        font-size: 0.75rem;
      }

      .btn-audio {
        padding: 6px 8px;
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>

    // --- SISTEMA DE PERFIS LOCAL ---
    let profiles = JSON.parse(localStorage.getItem('user_profiles')) || [
      { id: 'p_default', name: 'Principal', avatar: 'https://via.placeholder.com/150/222222/FFFFFF?text=P1' }
    ];
    let activeProfileId = localStorage.getItem('active_profile_id') || profiles[0].id;
    let editingProfileId = null;

    const profilesContainer = document.getElementById('profiles-container');
    const btnAddProfile = document.getElementById('btn-add-profile');
    const fileUploadInput = document.getElementById('file-upload-input');

    function saveProfiles() {
      localStorage.setItem('user_profiles', JSON.stringify(profiles));
      localStorage.setItem('active_profile_id', activeProfileId);
    }

    function renderProfiles() {
      profilesContainer.innerHTML = '';
      profiles.forEach(p => {
        const item = document.createElement('div');
        item.className = `profile-item ${p.id === activeProfileId ? 'active' : ''}`;
        
        item.innerHTML = `
          <div class="profile-avatar-box">
            <img src="${p.avatar}" alt="${p.name}">
            <div class="edit-pencil" title="Alterar foto">✏️</div>
          </div>
          <span class="profile-name-label">${p.name}</span>
        `;

        // Trocar de perfil ao clicar no item
        item.onclick = () => {
          activeProfileId = p.id;
          saveProfiles();
          renderProfiles();
          renderCards();
        };

        // Editar Foto ao clicar no lápis
        const pencil = item.querySelector('.edit-pencil');
        pencil.onclick = (e) => {
          e.stopPropagation();
          editingProfileId = p.id;
          fileUploadInput.click();
        };

        profilesContainer.appendChild(item);
      });
    }

    btnAddProfile.onclick = () => {
      const name = prompt('Nome do Perfil:');
      if (name && name.trim() !== '') {
        const newProf = {
          id: 'p_' + Date.now(),
          name: name.trim(),
          avatar: 'https://via.placeholder.com/150/222222/FFFFFF?text=' + encodeURIComponent(name.trim()[0].toUpperCase())
        };
        profiles.push(newProf);
        activeProfileId = newProf.id;
        saveProfiles();
        renderProfiles();
        renderCards();
      }
    };

    fileUploadInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file && editingProfileId) {
        const reader = new FileReader();
        reader.onload = (evt) => {
          const prof = profiles.find(p => p.id === editingProfileId);
          if (prof) {
            prof.avatar = evt.target.result;
            saveProfiles();
            renderProfiles();
          }
        };
        reader.readAsDataURL(file);
      }
    };

    // --- PROGRESSO & ARMAZENAMENTO ---
    function getProfileProgress() {
      return JSON.parse(localStorage.getItem(`progress_${activeProfileId}`)) || {};
    }

    function saveEpisodeProgress(epTitle, currentTime, duration) {
      if (!epTitle || !duration) return;
      const progress = getProfileProgress();
      progress[epTitle] = {
        time: currentTime,
        duration: duration,
        percent: (currentTime / duration) * 100
      };
      localStorage.setItem(`progress_${activeProfileId}`, JSON.stringify(progress));
      renderCards(); // Atualiza a barra vermelha
    }

    function extractYouTubeId(url) {
      const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
      return match ? match[1] : null;
    }

    // --- CARDS E CONTEÚDO ---
    function renderCards() {
      const gridSeries = document.getElementById('grid-series');
      const gridFandubs = document.getElementById('grid-fandubs');

      gridSeries.innerHTML = '';
      gridFandubs.innerHTML = '';

      const progressData = getProfileProgress();

      // Renderiza Séries
      siteData.series.forEach(s => {
        s.episodes.forEach(ep => {
          gridSeries.appendChild(createCard(ep, progressData));
        });
      });

      // Renderiza FanDubs
      siteData.fandubs.forEach(f => {
        f.episodes.forEach(ep => {
          gridFandubs.appendChild(createCard(ep, progressData));
        });
      });
    }

    function createCard(ep, progressData) {
      const card = document.createElement('div');
      card.className = 'card';

      const epProg = progressData[ep.title] ? progressData[ep.title].percent : 0;

      card.innerHTML = `
        <div class="thumb-box">
          <img src="${ep.thumb}" alt="${ep.title}">
          <div class="progress-track">
            <div class="progress-fill" style="width: ${epProg}%;"></div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${ep.title}</div>
          <div class="card-desc">${ep.desc}</div>
          <div class="audio-list"></div>
        </div>
      `;

      const audioList = card.querySelector('.audio-list');
      ep.audios.forEach(aud => {
        const btn = document.createElement('button');
        btn.className = 'btn-audio';
        btn.innerText = `▶ ${aud.label}`;
        btn.onclick = () => openPlayer(ep.title, aud.url);
        audioList.appendChild(btn);
      });

      return card;
    }

    // --- PLAYER DO YOUTUBE E AUTO-SAVE A CADA 10s ---
    let player = null;
    let autoSaveTimer = null;
    let currentPlayingTitle = null;

    function openPlayer(epTitle, videoUrl) {
      const ytId = extractYouTubeId(videoUrl);
      if (!ytId) {
        alert('URL do vídeo é inválida.');
        return;
      }

      currentPlayingTitle = epTitle;
      const modal = document.getElementById('video-modal');
      modal.style.display = 'flex';

      const progressData = getProfileProgress();
      const savedTime = progressData[epTitle] ? progressData[epTitle].time : 0;

      if (player && typeof player.loadVideoById === 'function') {
        player.loadVideoById({ videoId: ytId, startSeconds: Math.floor(savedTime) });
      } else {
        player = new YT.Player('player-iframe-target', {
          videoId: ytId,
          playerVars: {
            'autoplay': 1,
            'start': Math.floor(savedTime)
          },
          events: {
            'onStateChange': (evt) => {
              if (evt.data === YT.PlayerState.PAUSED || evt.data === YT.PlayerState.ENDED) {
                saveEpisodeProgress(currentPlayingTitle, player.getCurrentTime(), player.getDuration());
              }
            }
          }
        });
      }

      startAutoSave();
    }

    function startAutoSave() {
      stopAutoSave();
      autoSaveTimer = setInterval(() => {
        if (player && typeof player.getCurrentTime === 'function' && typeof player.getDuration === 'function') {
          const currentTime = player.getCurrentTime();
          const duration = player.getDuration();
          if (currentTime > 0) {
            saveEpisodeProgress(currentPlayingTitle, currentTime, duration);
          }
        }
      }, 10000); // Exatamente a cada 10 segundos
    }

    function stopAutoSave() {
      if (autoSaveTimer) {
        clearInterval(autoSaveTimer);
        autoSaveTimer = null;
      }
    }

    function closeModal() {
      const modal = document.getElementById('video-modal');
      modal.style.display = 'none';

      if (player && typeof player.getCurrentTime === 'function') {
        saveEpisodeProgress(currentPlayingTitle, player.getCurrentTime(), player.getDuration());
        player.stopVideo();
      }

      stopAutoSave();
      currentPlayingTitle = null;
    }

    document.getElementById('btn-close-modal').onclick = closeModal;

    // Inicialização do App
    window.onload = () => {
      renderProfiles();
      renderCards();
    };
  </script>
</body>
</html>
