<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlitchFlix</title>
    <style>
        :root {
            --bg-color: #141414;
            --text-color: #ffffff;
            --main-red: #E50914;
            --card-bg: #181818;
            --gray-text: #808080;
        }
        .light-mode {
            --bg-color: #f5f5f5;
            --text-color: #141414;
            --card-bg: #ffffff;
            --gray-text: #555555;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* --- TELA DE SELEÇÃO DE PERFIL --- */
        #profile-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: fixed;
            width: 100%;
            background: #141414;
            z-index: 3000;
        }
        #profile-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #fff;
            font-weight: 500;
        }
        .profiles-container {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .profile-card {
            text-align: center;
            cursor: pointer;
            width: 120px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
            transition: border 0.2s;
        }
        .profile-avatar svg {
            width: 60%;
            fill: #fff;
        }
        .profile-card:hover .profile-avatar {
            border-color: #fff;
        }
        .profile-name {
            margin-top: 0.7rem;
            font-size: 1rem;
            color: var(--gray-text);
        }
        .profile-card:hover .profile-name {
            color: #fff;
        }
        .btn-action {
            background: transparent;
            border: 1px solid var(--gray-text);
            color: var(--gray-text);
            padding: 0.6rem 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
        }
        .btn-action:hover {
            border-color: #fff;
            color: #fff;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 4%;
            position: sticky;
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 100;
        }
        .logo {
            color: var(--main-red);
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        nav {
            display: flex;
            gap: 1.5rem;
            margin-right: auto;
            margin-left: 3rem;
        }
        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        nav a:hover { opacity: 1; }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }

        /* --- CATALOGO --- */
        .main-container { padding: 2rem 4%; }
        .row-title {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }
        .movie-row {
            display: flex;
            gap: 0.6rem;
            overflow-x: auto;
            padding: 0.5rem 0 1.5rem 0;
            margin-bottom: 1.5rem;
        }
        .movie-row::-webkit-scrollbar { display: none; }
        .catalog-item {
            min-width: 240px;
            max-width: 240px;
            height: 135px;
            background: var(--card-bg);
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }
        .catalog-item:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        .catalog-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .catalog-info {
            position: absolute;
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            width: 100%;
            padding: 1rem 0.5rem 0.5rem 0.5rem;
            font-size: 0.85rem;
            color: #fff;
        }

        /* --- PLAYER ULTRA-ESTÁVEL GLITCHFLIX --- */
        #player-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 4000;
            overflow: hidden;
        }
        .video-wrapper {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            pointer-events: none; /* Desativa cliques do mouse no YouTube para não mostrar elementos */
        }
        #yt-player, #native-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
            padding: 2.5rem 2rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 4005;
        }
        #player-container:hover .player-controls { opacity: 1; }
        
        .timeline-container { display: flex; align-items: center; width: 100%; }
        .timeline {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            position: relative;
            transition: height 0.1s;
        }
        .timeline:hover { height: 6px; }
        .timeline-progress { height: 100%; background: var(--main-red); width: 0%; position: relative; }

        .control-buttons { display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 2rem; }
        .player-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; }
        .player-btn svg { width: 28px; height: 28px; fill: currentColor; }
        .slider-control { display: flex; align-items: center; gap: 0.8rem; }
        .slider-control input[type="range"] {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
        }
        .slider-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        /* --- MODAIS --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #181818;
            padding: 2.5rem;
            border-radius: 8px;
            width: 100%;
            max-width: 650px;
            color: #fff;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--gray-text);
        }
        .close-modal svg { width: 24px; height: 24px; fill: currentColor; }
        .ep-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .ep-item {
            display: flex; gap: 1rem; background: #222;
            padding: 0.8rem; border-radius: 4px; cursor: pointer; transition: background 0.2s;
        }
        .ep-item:hover { background: #2d2d2d; }
        .ep-item img { width: 130px; height: 75px; object-fit: cover; border-radius: 2px; background: #333; }
        
        .toggle-box {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 0; border-bottom: 1px solid #252525;
        }
    </style>
</head>
<body>

    <!-- SELEÇÃO DE PERFIL -->
    <div id="profile-screen">
        <h1>Quem está assistindo?</h1>
        <div class="profiles-container" id="profiles-box">
            <div class="profile-card" onclick="selectProfile('Visitante')">
                <div class="profile-avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
                </div>
                <div class="profile-name">Visitante</div>
            </div>
        </div>
        <button class="btn-action" onclick="createNewProfile()">Criar Perfil Customizado</button>
    </div>

    <!-- HEADER DA APLICAÇÃO -->
    <header>
        <div class="logo">GLITCHFLIX</div>
        <nav>
            <a href="#" onclick="renderCatalog('tudo')">Início</a>
            <a href="#" onclick="renderCatalog('serie')">Séries</a>
            <a href="#" onclick="renderCatalog('filme')">Filmes</a>
        </nav>
        <div class="nav-right">
            <button class="icon-btn" onclick="openModal('settings-modal')">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
            <div id="user-display" style="font-size: 0.9rem; border-left: 1px solid #333; padding-left: 1rem; color: var(--gray-text); cursor:pointer;" onclick="exitProfile()">Sair</div>
        </div>
    </header>

    <!-- CONTAINER DO CATÁLOGO -->
    <div class="main-container">
        <div id="series-section">
            <div class="row-title">Séries</div>
            <div class="movie-row" id="series-row"></div>
        </div>
        <div id="movies-section">
            <div class="row-title">Filmes</div>
            <div class="movie-row" id="movies-row"></div>
        </div>
    </div>

    <!-- PLAYER EMBUTIDO DA GLITCHFLIX -->
    <div id="player-container">
        <div class="video-wrapper" id="yt-wrapper" style="display:none;">
            <div id="yt-player"></div>
        </div>

        <video id="native-video" playsinline style="display:none;"></video>

        <div class="player-controls">
            <div class="timeline-container">
                <div class="timeline" id="video-timeline" onmousedown="seekVideo(event)">
                    <div class="timeline-progress" id="video-progress"></div>
                </div>
            </div>
            <div class="control-buttons">
                <div class="controls-left">
                    <button class="player-btn" onclick="togglePlay()" id="play-btn">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <div class="slider-control">
                        <span style="font-size:0.8rem;">ÁUDIO</span>
                        <input type="range" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
                    </div>
                    <div class="slider-control">
                        <span style="font-size:0.8rem;">BRILHO</span>
                        <input type="range" min="0.2" max="1.5" step="0.05" value="1" oninput="setBrightness(this.value)">
                    </div>
                </div>
                <div class="controls-right">
                    <select id="speed-selector" style="background:#141414; color:#fff; border:1px solid #333; padding:5px; border-radius:4px;" onchange="setSpeed(this.value)">
                        <option value="1" selected>1x (Normal)</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                    <button class="player-btn" onclick="toggleFullScreen()">
                        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                    <button class="player-btn" style="color: var(--main-red);" onclick="closePlayer()">
                        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAIS -->
    <div id="episodes-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('episodes-modal')">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            <h2 id="modal-title"></h2>
            <p id="modal-desc" style="color: var(--gray-text); margin: 0.5rem 0 1.5rem 0; font-size:0.95rem; line-height:1.4;"></p>
            <h3 style="font-weight: 500; border-bottom:1px solid #333; padding-bottom:0.5rem;">Episódios</h3>
            <div class="ep-list" id="modal-episodes-list"></div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('settings-modal')">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            <h2>Configurações</h2>
            <br>
            <div class="toggle-box">
                <span>Modo Escuro (Padrão)</span>
                <input type="checkbox" id="theme-toggle" checked onchange="toggleTheme()">
            </div>
        </div>
    </div>

    <!-- SCRIPT DA API OFICIAL DO YOUTUBE -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let fullCatalog = { series: [], movies: [] };
        let ytPlayer = null;
        let activeType = null; // 'youtube' ou 'native'
        let progressInterval = null;

        async function fetchCatalog() {
            try {
                const response = await fetch('catalog.json');
                fullCatalog = await response.json();
                renderCatalog('tudo');
            } catch (error) {
                console.error("Erro ao carregar catálogo:", error);
            }
        }

        function renderCatalog(filter) {
            const seriesRow = document.getElementById('series-row');
            const moviesRow = document.getElementById('movies-row');
            const seriesSection = document.getElementById('series-section');
            const moviesSection = document.getElementById('movies-section');

            seriesRow.innerHTML = '';
            moviesRow.innerHTML = '';

            if(filter === 'tudo' || filter === 'serie') {
                seriesSection.style.display = 'block';
                if(fullCatalog.series) {
                    fullCatalog.series.forEach(item => {
                        seriesRow.innerHTML += `
                            <div class="catalog-item" onclick="openEpisodesModal(${item.id})">
                                <img src="${item.thumb}" alt="${item.title}">
                                <div class="catalog-info"><strong>${item.title}</strong> • ${item.rating}</div>
                            </div>`;
                    });
                }
            } else { seriesSection.style.display = 'none'; }

            if(filter === 'tudo' || filter === 'filme') {
                moviesSection.style.display = 'block';
                if(fullCatalog.movies) {
                    fullCatalog.movies.forEach(item => {
                        moviesRow.innerHTML += `
                            <div class="catalog-item" onclick="startPlayer('${item.videoUrl}')">
                                <img src="${item.thumb}" alt="${item.title}">
                                <div class="catalog-info"><strong>${item.title}</strong> • ${item.rating}</div>
                            </div>`;
                    });
                }
            } else { moviesSection.style.display = 'none'; }
        }

        function openEpisodesModal(id) {
            const serie = fullCatalog.series.find(s => s.id === id);
            document.getElementById('modal-title').innerText = `${serie.title} (${serie.rating})`;
            document.getElementById('modal-desc').innerText = serie.desc;
            
            const list = document.getElementById('modal-episodes-list');
            list.innerHTML = '';

            serie.episodes.forEach(ep => {
                list.innerHTML += `
                    <div class="ep-item" onclick="closeModal('episodes-modal'); startPlayer('${ep.videoUrl}')">
                        <img src="${ep.thumb}">
                        <div>
                            <h4 style="margin-bottom:4px;">${ep.title}</h4>
                            <p style="font-size:0.85rem; color:var(--gray-text); line-height:1.3;">${ep.desc}</p>
                        </div>
                    </div>`;
            });
            openModal('episodes-modal');
        }

        // --- CONTROLE UNIVERSAL DO PLAYER ---
        const playerContainer = document.getElementById('player-container');
        const ytWrapper = document.getElementById('yt-wrapper');
        const nativeVideo = document.getElementById('native-video');
        const progress = document.getElementById('video-progress');
        const playBtn = document.getElementById('play-btn');

        function extractYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function startPlayer(url) {
            playerContainer.style.display = 'block';
            const ytId = extractYouTubeID(url);

            if (ytId) {
                activeType = 'youtube';
                nativeVideo.style.display = 'none';
                nativeVideo.pause();
                ytWrapper.style.display = 'block';

                if (!ytPlayer) {
                    ytPlayer = new YT.Player('yt-player', {
                        videoId: ytId,
                        playerVars: {
                            'autoplay': 1,
                            'controls': 0, // Desativa os controles do YouTube para usar os da GlitchFlix
                            'disablekb': 1,
                            'modestbranding': 1,
                            'rel': 0,
                            'showinfo': 0
                        },
                        events: {
                            'onReady': (e) => { e.target.playVideo(); startProgressTracker(); },
                            'onStateChange': (e) => { updatePlayIcon(e.data === YT.PlayerState.PLAYING); }
                        }
                    });
                } else {
                    ytPlayer.loadVideoById(ytId);
                    ytPlayer.playVideo();
                    startProgressTracker();
                }
            } else {
                activeType = 'native';
                ytWrapper.style.display = 'none';
                if(ytPlayer) ytPlayer.stopVideo();

                nativeVideo.style.display = 'block';
                nativeVideo.src = url;
                nativeVideo.play();
                updatePlayIcon(true);

                nativeVideo.ontimeupdate = () => {
                    const pct = (nativeVideo.currentTime / nativeVideo.duration) * 100;
                    progress.style.width = `${pct}%`;
                };
            }
        }

        function startProgressTracker() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (activeType === 'youtube' && ytPlayer && ytPlayer.getDuration) {
                    const cur = ytPlayer.getCurrentTime();
                    const dur = ytPlayer.getDuration();
                    if (dur > 0) {
                        const pct = (cur / dur) * 100;
                        progress.style.width = `${pct}%`;
                    }
                }
            }, 500);
        }

        function togglePlay() {
            if (activeType === 'youtube' && ytPlayer) {
                const state = ytPlayer.getPlayerState();
                if (state === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
                else ytPlayer.playVideo();
            } else if (activeType === 'native') {
                if (nativeVideo.paused) { nativeVideo.play(); updatePlayIcon(true); }
                else { nativeVideo.pause(); updatePlayIcon(false); }
            }
        }

        function updatePlayIcon(isPlaying) {
            playBtn.innerHTML = isPlaying 
                ? `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
                : `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
        }

        function seekVideo(e) {
            const rect = document.getElementById('video-timeline').getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;

            if (activeType === 'youtube' && ytPlayer) {
                const dur = ytPlayer.getDuration();
                ytPlayer.seekTo(pct * dur, true);
            } else if (activeType === 'native') {
                nativeVideo.currentTime = pct * nativeVideo.duration;
            }
        }

        function setVolume(val) {
            if (activeType === 'youtube' && ytPlayer) ytPlayer.setVolume(val * 100);
            else nativeVideo.volume = val;
        }

        function setBrightness(val) {
            document.getElementById('player-container').style.filter = `brightness(${val})`;
        }

        function setSpeed(val) {
            const rate = parseFloat(val);
            if (activeType === 'youtube' && ytPlayer) ytPlayer.setPlaybackRate(rate);
            else nativeVideo.playbackRate = rate;
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) playerContainer.requestFullscreen();
            else document.exitFullscreen();
        }

        function closePlayer() {
            clearInterval(progressInterval);
            if (ytPlayer) ytPlayer.stopVideo();
            nativeVideo.pause();
            nativeVideo.src = "";
            playerContainer.style.display = 'none';
        }

        // --- GERENCIAMENTO DE INTERFACE ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleTheme() { document.body.classList.toggle('light-mode', !document.getElementById('theme-toggle').checked); }
        function selectProfile(name) {
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('user-display').innerText = `${name} (Sair)`;
        }
        function exitProfile() { document.getElementById('profile-screen').style.display = 'flex'; }
        
        function createNewProfile() {
            const name = prompt("Nome do perfil:");
            if(name) {
                const box = document.getElementById('profiles-box');
                box.innerHTML += `
                    <div class="profile-card" onclick="selectProfile('${name}')">
                        <div class="profile-avatar">
                            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
                        </div>
                        <div class="profile-name">${name}</div>
                    </div>`;
            }
        }

        fetchCatalog();
    </script>
</body>
