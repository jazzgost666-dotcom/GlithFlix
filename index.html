<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma de Séries</title>
  <style>
    :root {
      --bg-color: #141414;
      --card-bg: #1f1f1f;
      --accent-color: #e50914;
      --text-color: #ffffff;
      --text-sub: #aaaaaa;
      --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-main);
      overflow-x: hidden;
    }

    /* --- NAV BAR / CABEÇALHO --- */
    navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0));
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }

    .nav-brand {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-color);
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-link {
      color: var(--text-sub);
      text-decoration: none;
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--text-color);
      font-weight: bold;
    }

    /* --- PERFIL NO TOPO --- */
    .profile-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .active-profile-avatar {
      position: relative;
      width: 40px;
      height: 40px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }

    .active-profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .edit-pencil-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 0.9rem;
    }

    .active-profile-avatar:hover .edit-pencil-overlay {
      opacity: 1;
    }

    /* --- PÁGINAS --- */
    .page {
      display: none;
      padding-top: 80px;
      min-height: 100vh;
    }

    .page.active {
      display: block;
    }

    /* --- BANNER DE DESTAQUE --- */
    .hero-banner {
      position: relative;
      width: 100%;
      height: 60vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      padding: 40px;
      margin-bottom: 30px;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, var(--bg-color) 10%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0.8) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
    }

    .hero-title {
      font-size: 2.8rem;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .hero-badge {
      display: inline-block;
      background-color: var(--accent-color);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .hero-desc {
      font-size: 1rem;
      color: #ddd;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    /* --- GRID DE EPISÓDIOS --- */
    .container {
      padding: 0 40px 40px 40px;
    }

    .section-title {
      font-size: 1.5rem;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .ep-card {
      background-color: var(--card-bg);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease;
    }

    .ep-card:hover {
      transform: scale(1.03);
    }

    .ep-thumb-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    .ep-thumb-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .progress-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
    }

    .progress-bar-fill {
      height: 100%;
      background-color: var(--accent-color);
      width: 0%;
      transition: width 0.3s;
    }

    .ep-info {
      padding: 15px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .ep-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .ep-desc {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-bottom: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ep-audios {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-play {
      background-color: #333;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      transition: background-color 0.2s;
    }

    .btn-play:hover {
      background-color: var(--accent-color);
    }

    /* --- GERENCIADOR DE PERFIS (PÁGINA) --- */
    .profiles-grid {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 50px;
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .profile-box {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      border: 3px solid transparent;
      margin-bottom: 10px;
      position: relative;
    }

    .profile-card.active .profile-box {
      border-color: var(--accent-color);
    }

    .profile-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-add-prof {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      border: 2px dashed #555;
      background: transparent;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- PLAYER MODAL --- */
    .player-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .player-container {
      position: relative;
      width: 85%;
      max-width: 1000px;
      aspect-ratio: 16 / 9;
    }

    .btn-close-player {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
    }

    #yt-player {
      width: 100%;
      height: 100%;
    }

    #file-input { display: none; }
  </style>
</head>
<body>

  <navbar>
    <div class="nav-brand">PLATAFORMA</div>
    <div class="nav-links">
      <span class="nav-link active" onclick="switchPage('series')">Séries</span>
      <span class="nav-link" onclick="switchPage('fandubs')">FanDubs</span>
      <span class="nav-link" onclick="switchPage('profiles')">Perfis</span>
    </div>
    <div class="profile-section">
      <div class="active-profile-avatar" id="nav-avatar" onclick="triggerPhotoUpload()">
        <img id="nav-avatar-img" src="" alt="Perfil">
        <div class="edit-pencil-overlay">✏️</div>
      </div>
    </div>
  </navbar>

  <input type="file" id="file-input" accept="image/*">

  <!-- PÁGINA SÉRIES -->
  <div id="page-series" class="page active">
    <div id="series-hero"></div>
    <div class="container">
      <div class="section-title">Episódios</div>
      <div class="episodes-grid" id="grid-series-episodes"></div>
    </div>
  </div>

  <!-- PÁGINA FANDUBS -->
  <div id="page-fandubs" class="page">
    <div id="fandubs-hero"></div>
    <div class="container">
      <div class="section-title">Episódios FanDub</div>
      <div class="episodes-grid" id="grid-fandubs-episodes"></div>
    </div>
  </div>

  <!-- PÁGINA PERFIS -->
  <div id="page-profiles" class="page">
    <div class="container" style="text-align: center; margin-top: 40px;">
      <div class="section-title">Quem está assistindo?</div>
      <div class="profiles-grid" id="profiles-manager-grid"></div>
    </div>
  </div>

  <!-- MODAL PLAYER -->
  <div class="player-modal" id="player-modal">
    <div class="player-container">
      <button class="btn-close-player" onclick="closePlayer()">&times;</button>
      <div id="yt-player"></div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const siteData = {
      "series": [
        {
          "id": 1,
          "title": "The Amazing Digital Circus",
          "desc": "The Amazing Digital Circus is a psychological dark comedy about a cast of cute cartoon characters trying to cope with arbitrary personal traumas.",
          "rating": "12+",
          "thumb": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR2va3lO1isTlm0lahDByuisBVEEoLa_Y7IccD8rYTzxntMlnbGckc6Np6W&s=10",
          "episodes": [
            {
              "title": "THE AMAZING DIGITAL CIRCUS: PILOT",
              "desc": "Episódio Piloto",
              "thumb": "https://i.ytimg.com/vi/HwAPLk_sQ3w/hqdefault.jpg",
              "audios": [
                { "label": "🇧🇷 Dublado (PT-BR)", "url": "https://www.youtube.com/watch?v=HRdbWsE8oDM" },
                { "label": "🇺🇸 Original (Inglês)", "url": "https://www.youtube.com/watch?v=HwAPLk_sQ3w" }
              ]
            },
            {
              "title": "Ep 2: Candy Carrier Chaos!",
              "desc": "The gang are BACK for a WAaAaAaACKY candy filled adventure!",
              "thumb": "https://i.ytimg.com/vi/4ofJpOEXrZs/hqdefault.jpg",
              "audios": [
                { "label": "🇧🇷 Dublado (PT-BR)", "url": "https://www.youtube.com/watch?v=CS_CgGRHYqM" },
                { "label": "🇺🇸 Original (Inglês)", "url": "https://www.youtube.com/watch?v=4ofJpOEXrZs" }
              ]
            },
            {
              "title": "Ep 3: The Mystery Of Mildenhall Manor",
              "desc": "Kinger gets a shotgun! Zooble goes to therapy! Pomni goes to hell!",
              "thumb": "https://i.ytimg.com/vi/bKjfw77cxeQ/hq720.jpg",
              "audios": [
                { "label": "🇧🇷 Dublado (PT-BR)", "url": "https://www.youtube.com/watch?v=QbXW0TLs5yk" },
                { "label": "🇺🇸 Original (Inglês)", "url": "https://www.youtube.com/watch?v=bKjfw77cxeQ" }
              ]
            }
          ]
        }
      ],
      "fandubs": [
        {
          "id": 101,
          "title": "A Incrível Copa Digital",
          "desc": "Série de Fan Dublagens da Incrível Copa Digital.",
          "rating": "10+",
          "thumb": "https://i.ytimg.com/vi/xl6F1yMv40U/hq720.jpg",
          "episodes": [
            {
              "title": "EP 1: Bota o endrick!!",
              "desc": "Episódio 1 da Fan Dublagem",
              "thumb": "https://i.ytimg.com/vi/xl6F1yMv40U/hq720.jpg",
              "audios": [
                { "label": "🇧🇷 Dublado (PT-BR)", "url": "https://www.youtube.com/watch?v=xl6F1yMv40U" }
              ]
            }
          ]
        }
      ]
    };

    // --- PERFIS ---
    let profiles = JSON.parse(localStorage.getItem('user_profiles')) || [
      { id: 'p1', name: 'Principal', avatar: 'https://via.placeholder.com/150/222/FFF?text=P1' }
    ];
    let activeProfileId = localStorage.getItem('active_profile_id') || profiles[0].id;

    function saveProfiles() {
      localStorage.setItem('user_profiles', JSON.stringify(profiles));
      localStorage.setItem('active_profile_id', activeProfileId);
      updateNavAvatar();
    }

    function updateNavAvatar() {
      const activeProf = profiles.find(p => p.id === activeProfileId) || profiles[0];
      document.getElementById('nav-avatar-img').src = activeProf.avatar;
    }

    function renderProfilesManager() {
      const grid = document.getElementById('profiles-manager-grid');
      grid.innerHTML = '';

      profiles.forEach(p => {
        const card = document.createElement('div');
        card.className = `profile-card ${p.id === activeProfileId ? 'active' : ''}`;
        card.innerHTML = `
          <div class="profile-box">
            <img src="${p.avatar}">
          </div>
          <span>${p.name}</span>
        `;
        card.onclick = () => {
          activeProfileId = p.id;
          saveProfiles();
          renderProfilesManager();
          renderContent();
        };
        grid.appendChild(card);
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add-prof';
      addBtn.innerText = '+';
      addBtn.onclick = () => {
        const name = prompt('Nome do novo perfil:');
        if (name) {
          const newP = {
            id: 'p_' + Date.now(),
            name: name,
            avatar: 'https://via.placeholder.com/150/222/FFF?text=' + name[0].toUpperCase()
          };
          profiles.push(newP);
          activeProfileId = newP.id;
          saveProfiles();
          renderProfilesManager();
          renderContent();
        }
      };
      grid.appendChild(addBtn);
    }

    function triggerPhotoUpload() {
      document.getElementById('file-input').click();
    }

    document.getElementById('file-input').onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (evt) => {
          const activeProf = profiles.find(p => p.id === activeProfileId);
          if (activeProf) {
            activeProf.avatar = evt.target.result;
            saveProfiles();
            renderProfilesManager();
          }
        };
        reader.readAsDataURL(file);
      }
    };

    // --- NAVEGAÇÃO DE PÁGINAS ---
    function switchPage(pageName) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

      document.getElementById(`page-${pageName}`).classList.add('active');
      event.target.classList.add('active');
    }

    // --- PROGRESSO & CARDS ---
    function getProgress() {
      return JSON.parse(localStorage.getItem(`progress_${activeProfileId}`)) || {};
    }

    function saveProgress(epTitle, currentTime, duration) {
      if (!epTitle || !duration) return;
      const prog = getProgress();
      prog[epTitle] = { time: currentTime, duration: duration, percent: (currentTime / duration) * 100 };
      localStorage.setItem(`progress_${activeProfileId}`, JSON.stringify(prog));
      renderContent();
    }

    function renderContent() {
      const progData = getProgress();

      // Séries Page
      const series = siteData.series[0];
      document.getElementById('series-hero').innerHTML = `
        <div class="hero-banner" style="background-image: url('${series.thumb}');">
          <div class="hero-overlay"></div>
          <div class="hero-content">
            <span class="hero-badge">${series.rating}</span>
            <h1 class="hero-title">${series.title}</h1>
            <p class="hero-desc">${series.desc}</p>
          </div>
        </div>
      `;

      const seriesGrid = document.getElementById('grid-series-episodes');
      seriesGrid.innerHTML = '';
      series.episodes.forEach(ep => seriesGrid.appendChild(createEpCard(ep, progData)));

      // FanDubs Page
      const fandub = siteData.fandubs[0];
      document.getElementById('fandubs-hero').innerHTML = `
        <div class="hero-banner" style="background-image: url('${fandub.thumb}');">
          <div class="hero-overlay"></div>
          <div class="hero-content">
            <span class="hero-badge">${fandub.rating}</span>
            <h1 class="hero-title">${fandub.title}</h1>
            <p class="hero-desc">${fandub.desc}</p>
          </div>
        </div>
      `;

      const fandubsGrid = document.getElementById('grid-fandubs-episodes');
      fandubsGrid.innerHTML = '';
      fandub.episodes.forEach(ep => fandubsGrid.appendChild(createEpCard(ep, progData)));
    }

    function createEpCard(ep, progData) {
      const card = document.createElement('div');
      card.className = 'ep-card';
      const percent = progData[ep.title] ? progData[ep.title].percent : 0;

      card.innerHTML = `
        <div class="ep-thumb-wrapper">
          <img src="${ep.thumb}">
          <div class="progress-bar-container">
            <div class="progress-bar-fill" style="width: ${percent}%;"></div>
          </div>
        </div>
        <div class="ep-info">
          <div class="ep-title">${ep.title}</div>
          <div class="ep-desc">${ep.desc}</div>
          <div class="ep-audios"></div>
        </div>
      `;

      const audiosBox = card.querySelector('.ep-audios');
      ep.audios.forEach(aud => {
        const btn = document.createElement('button');
        btn.className = 'btn-play';
        btn.innerText = `▶ ${aud.label}`;
        btn.onclick = () => playVideo(ep.title, aud.url);
        audiosBox.appendChild(btn);
      });

      return card;
    }

    // --- YOUTUBE PLAYER & AUTO SAVE 10S ---
    let player = null;
    let currentTitle = null;
    let autoSaveInterval = null;

    function getYTId(url) {
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
      return m ? m[1] : null;
    }

    function playVideo(epTitle, url) {
      const ytId = getYTId(url);
      if (!ytId) return;

      currentTitle = epTitle;
      const progData = getProgress();
      const startTime = progData[epTitle] ? progData[epTitle].time : 0;

      document.getElementById('player-modal').style.display = 'flex';

      if (player && typeof player.loadVideoById === 'function') {
        player.loadVideoById({ videoId: ytId, startSeconds: Math.floor(startTime) });
      } else {
        player = new YT.Player('yt-player', {
          videoId: ytId,
          playerVars: { 'autoplay': 1, 'start': Math.floor(startTime) }
        });
      }

      clearInterval(autoSaveInterval);
      autoSaveInterval = setInterval(() => {
        if (player && typeof player.getCurrentTime === 'function') {
          saveProgress(currentTitle, player.getCurrentTime(), player.getDuration());
        }
      }, 10000);
    }

    function closePlayer() {
      document.getElementById('player-modal').style.display = 'none';
      if (player && typeof player.getCurrentTime === 'function') {
        saveProgress(currentTitle, player.getCurrentTime(), player.getDuration());
        player.stopVideo();
      }
      clearInterval(autoSaveInterval);
    }

    window.onload = () => {
      updateNavAvatar();
      renderProfilesManager();
      renderContent();
    };
  </script>
</body>
</html>
