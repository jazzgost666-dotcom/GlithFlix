<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma de Vídeos</title>
  <style>
    :root {
      --bg-color: #141414;
      --card-bg: #1f1f1f;
      --text-color: #ffffff;
      --accent-color: #e50914;
      --font-family: Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    /* --- PERFIS --- */
    .profiles-container {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .profile-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 64px;
      cursor: pointer;
    }

    .profile-avatar-wrapper {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid transparent;
    }

    .profile-card.active .profile-avatar-wrapper {
      border-color: var(--accent-color);
    }

    .profile-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .edit-pencil {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      color: #fff;
      font-size: 1.2rem;
    }

    .profile-avatar-wrapper:hover .edit-pencil {
      opacity: 1;
    }

    .profile-name {
      font-size: 0.75rem;
      margin-top: 4px;
      text-align: center;
      word-break: break-all;
    }

    .add-profile-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px dashed #555;
      background: transparent;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }

    #file-input {
      display: none;
    }

    /* --- SEÇÕES & CARDS --- */
    section {
      margin-bottom: 32px;
    }

    h2 {
      font-size: 1.2rem;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .thumb-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background-color: #000;
    }

    .thumb-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Barra vermelha de progresso assistido */
    .progress-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
    }

    .progress-bar-fill {
      height: 100%;
      background-color: var(--accent-color);
      width: 0%;
    }

    .card-content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-title {
      font-size: 1rem;
      font-weight: bold;
    }

    .card-desc {
      font-size: 0.8rem;
      color: #aaa;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .audios-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: auto;
    }

    .audio-btn {
      background-color: #333;
      color: #fff;
      border: none;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: left;
    }

    /* --- MODAL DO PLAYER --- */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .modal-content {
      position: relative;
      width: 90%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
    }

    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
    }

    #youtube-player-container {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Minhas Séries</h1>
    <div class="profiles-container">
      <div id="profiles-list" style="display: flex; gap: 12px;"></div>
      <button class="add-profile-btn" id="add-profile-btn" title="Criar novo perfil">+</button>
    </div>
  </header>

  <main>
    <section>
      <h2>Séries Principais</h2>
      <div class="grid" id="series-grid"></div>
    </section>

    <section>
      <h2>FanDubs</h2>
      <div class="grid" id="fandubs-grid"></div>
    </section>
  </main>

  <input type="file" id="file-input" accept="image/*">

  <div class="modal" id="video-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="youtube-player-container"></div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
